<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>静态网页天气查询示例</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      color: #333;
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 36px;
    }

    .header p {
      margin: 0;
      opacity: 0.9;
    }

    .search-box {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      margin-bottom: 24px;
    }

    .search-form {
      display: flex;
      gap: 12px;
    }

    .search-form input {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    .search-form input:focus {
      border-color: #5b7cfa;
    }

    .search-form button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #5b7cfa;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .search-form button:hover {
      background: #3f63f1;
    }

    .tip {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #e67e22;
    }

    .weather-card {
      display: none;
      background: #fff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      margin-bottom: 24px;
    }

    .weather-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .city-name {
      font-size: 28px;
      margin: 0 0 8px;
      color: #222;
    }

    .weather-desc {
      font-size: 18px;
      color: #666;
    }

    .temperature {
      font-size: 56px;
      font-weight: bold;
      color: #5b7cfa;
      white-space: nowrap;
    }

    .details {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .detail-item {
      background: #f5f7ff;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .detail-label {
      color: #777;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .forecast {
      display: none;
      background: #fff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .forecast h2 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #222;
    }

    .forecast-list {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .forecast-item {
      background: #f7f8fb;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    .forecast-date {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .forecast-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .forecast-weather {
      color: #555;
      margin-bottom: 8px;
      min-height: 40px;
    }

    .forecast-temp {
      color: #333;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #fff;
      font-size: 14px;
      opacity: 0.9;
    }

    code {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      .search-form {
        flex-direction: column;
      }

      .details {
        grid-template-columns: repeat(2, 1fr);
      }

      .forecast-list {
        grid-template-columns: repeat(2, 1fr);
      }

      .temperature {
        font-size: 44px;
      }
    }

    @media (max-width: 480px) {
      .details {
        grid-template-columns: 1fr;
      }

      .forecast-list {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <h1>静态网页天气查询</h1>
      <p>这是一个纯静态 HTML 页面，通过 JavaScript 请求公开天气 API 展示数据</p>
    </header>

    <section class="search-box">
      <form class="search-form" id="searchForm">
        <input
          type="text"
          id="cityInput"
          placeholder="请输入城市名称，例如：北京、上海、广州、Tokyo"
          value="北京"
        />
        <button type="submit">查询天气</button>
      </form>

      <div class="tip">
        数据来源：Open-Meteo 免费公开 API，无需后端、无需 API Key。
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="weather-card" id="weatherCard">
      <div class="weather-main">
        <div>
          <h2 class="city-name" id="cityName">城市名称</h2>
          <div class="weather-desc" id="weatherDesc">天气情况</div>
          <div class="weather-desc" id="updateTime">更新时间</div>
        </div>

        <div class="temperature" id="temperature">--℃</div>
      </div>

      <div class="details">
        <div class="detail-item">
          <div class="detail-label">体感温度</div>
          <div class="detail-value" id="apparentTemp">--℃</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">相对湿度</div>
          <div class="detail-value" id="humidity">--%</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">风速</div>
          <div class="detail-value" id="windSpeed">-- km/h</div>
        </div>

        <div class="detail-item">
          <div class="detail-label">经纬度</div>
          <div class="detail-value" id="location">--</div>
        </div>
      </div>
    </section>

    <section class="forecast" id="forecast">
      <h2>未来 5 天天气预报</h2>
      <div class="forecast-list" id="forecastList"></div>
    </section>

    <footer class="footer">
      <p>当前页面只有一个 <code>index.html</code> 文件，所有动态数据都由浏览器中的 JavaScript 获取。</p>
    </footer>
  </div>

  <script>
    const searchForm = document.getElementById("searchForm");
    const cityInput = document.getElementById("cityInput");
    const statusEl = document.getElementById("status");

    const weatherCard = document.getElementById("weatherCard");
    const forecastSection = document.getElementById("forecast");
    const forecastList = document.getElementById("forecastList");

    const cityNameEl = document.getElementById("cityName");
    const weatherDescEl = document.getElementById("weatherDesc");
    const updateTimeEl = document.getElementById("updateTime");
    const temperatureEl = document.getElementById("temperature");
    const apparentTempEl = document.getElementById("apparentTemp");
    const humidityEl = document.getElementById("humidity");
    const windSpeedEl = document.getElementById("windSpeed");
    const locationEl = document.getElementById("location");

    searchForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const city = cityInput.value.trim();

      if (!city) {
        showStatus("请输入城市名称。", true);
        return;
      }

      getWeatherByCity(city);
    });

    async function getWeatherByCity(city) {
      try {
        showStatus("正在查询城市信息...");
        hideResult();

        const geoUrl =
          "https://geocoding-api.open-meteo.com/v1/search" +
          "?name=" + encodeURIComponent(city) +
          "&count=1" +
          "&language=zh" +
          "&format=json";

        const geoResponse = await fetch(geoUrl);

        if (!geoResponse.ok) {
          throw new Error("城市查询接口请求失败");
        }

        const geoData = await geoResponse.json();

        if (!geoData.results || geoData.results.length === 0) {
          showStatus("没有找到这个城市，请换一个城市名称试试。", true);
          return;
        }

        const cityInfo = geoData.results[0];

        const latitude = cityInfo.latitude;
        const longitude = cityInfo.longitude;

        showStatus("已找到城市，正在获取天气数据...");

        const weatherUrl =
          "https://api.open-meteo.com/v1/forecast" +
          "?latitude=" + encodeURIComponent(latitude) +
          "&longitude=" + encodeURIComponent(longitude) +
          "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m" +
          "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max" +
          "&timezone=auto" +
          "&forecast_days=5";

        const weatherResponse = await fetch(weatherUrl);

        if (!weatherResponse.ok) {
          throw new Error("天气接口请求失败");
        }

        const weatherData = await weatherResponse.json();

        renderCurrentWeather(cityInfo, weatherData);
        renderForecast(weatherData);

        showStatus("");
      } catch (error) {
        console.error(error);
        showStatus("请求失败：" + error.message, true);
      }
    }

    function renderCurrentWeather(cityInfo, weatherData) {
      const current = weatherData.current;
      const currentUnits = weatherData.current_units;

      const cityFullName = [
        cityInfo.name,
        cityInfo.admin1,
        cityInfo.country
      ].filter(Boolean).join("，");

      const weatherInfo = getWeatherInfo(current.weather_code);

      cityNameEl.textContent = cityFullName;
      weatherDescEl.textContent = weatherInfo.icon + " " + weatherInfo.text;
      updateTimeEl.textContent = "更新时间：" + formatDateTime(current.time);

      temperatureEl.textContent =
        Math.round(current.temperature_2m) +
        (currentUnits.temperature_2m || "℃");

      apparentTempEl.textContent =
        Math.round(current.apparent_temperature) +
        (currentUnits.apparent_temperature || "℃");

      humidityEl.textContent =
        current.relative_humidity_2m +
        (currentUnits.relative_humidity_2m || "%");

      windSpeedEl.textContent =
        current.wind_speed_10m +
        " " +
        (currentUnits.wind_speed_10m || "km/h");

      locationEl.textContent =
        cityInfo.latitude.toFixed(2) + ", " + cityInfo.longitude.toFixed(2);

      weatherCard.style.display = "block";
    }

    function renderForecast(weatherData) {
      const daily = weatherData.daily;

      forecastList.innerHTML = "";

      for (let i = 0; i < daily.time.length; i++) {
        const weatherInfo = getWeatherInfo(daily.weather_code[i]);

        const item = document.createElement("div");
        item.className = "forecast-item";

        const date = document.createElement("div");
        date.className = "forecast-date";
        date.textContent = formatDate(daily.time[i]);

        const icon = document.createElement("div");
        icon.className = "forecast-icon";
        icon.textContent = weatherInfo.icon;

        const weather = document.createElement("div");
        weather.className = "forecast-weather";
        weather.textContent = weatherInfo.text;

        const temp = document.createElement("div");
        temp.className = "forecast-temp";
        temp.textContent =
          Math.round(daily.temperature_2m_min[i]) +
          "℃ / " +
          Math.round(daily.temperature_2m_max[i]) +
          "℃";

        const rain = document.createElement("div");
        rain.className = "forecast-weather";

        const rainValue = daily.precipitation_probability_max[i];

        if (rainValue === null || rainValue === undefined) {
          rain.textContent = "降水概率：--";
        } else {
          rain.textContent = "降水概率：" + rainValue + "%";
        }

        item.appendChild(date);
        item.appendChild(icon);
        item.appendChild(weather);
        item.appendChild(temp);
        item.appendChild(rain);

        forecastList.appendChild(item);
      }

      forecastSection.style.display = "block";
    }

    function getWeatherInfo(code) {
      const weatherMap = {
        0: { text: "晴朗", icon: "☀️" },
        1: { text: "大部分晴朗", icon: "🌤️" },
        2: { text: "局部多云", icon: "⛅" },
        3: { text: "阴天", icon: "☁️" },

        45: { text: "有雾", icon: "🌫️" },
        48: { text: "结霜雾", icon: "🌫️" },

        51: { text: "小毛毛雨", icon: "🌦️" },
        53: { text: "中等毛毛雨", icon: "🌦️" },
        55: { text: "大毛毛雨", icon: "🌧️" },

        56: { text: "轻微冻雨", icon: "🌧️" },
        57: { text: "强冻雨", icon: "🌧️" },

        61: { text: "小雨", icon: "🌧️" },
        63: { text: "中雨", icon: "🌧️" },
        65: { text: "大雨", icon: "🌧️" },

        66: { text: "轻微冻雨", icon: "🌧️" },
        67: { text: "强冻雨", icon: "🌧️" },

        71: { text: "小雪", icon: "🌨️" },
        73: { text: "中雪", icon: "🌨️" },
        75: { text: "大雪", icon: "❄️" },

        77: { text: "雪粒", icon: "❄️" },

        80: { text: "小阵雨", icon: "🌦️" },
        81: { text: "中等阵雨", icon: "🌧️" },
        82: { text: "强阵雨", icon: "⛈️" },

        85: { text: "小阵雪", icon: "🌨️" },
        86: { text: "大阵雪", icon: "❄️" },

        95: { text: "雷暴", icon: "⛈️" },
        96: { text: "雷暴伴小冰雹", icon: "⛈️" },
        99: { text: "雷暴伴大冰雹", icon: "⛈️" }
      };

      return weatherMap[code] || { text: "未知天气", icon: "❓" };
    }

    function formatDateTime(value) {
      const date = new Date(value);

      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatDate(value) {
      const date = new Date(value + "T00:00:00");

      return date.toLocaleDateString("zh-CN", {
        month: "short",
        day: "numeric",
        weekday: "short"
      });
    }

    function showStatus(message, isError) {
      statusEl.textContent = message || "";
      statusEl.style.color = isError ? "#e74c3c" : "#e67e22";
    }

    function hideResult() {
      weatherCard.style.display = "none";
      forecastSection.style.display = "none";
      forecastList.innerHTML = "";
    }

    // 页面打开时默认查询北京天气
    getWeatherByCity("北京");
  </script>
</body>
</html>

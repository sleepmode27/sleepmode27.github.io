<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>PDF 文档</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
    }

    nav {
      background: #222;
      padding: 12px 24px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-right: 20px;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 24px;
    }

    .pdf-container {
      width: 100%;
      height: calc(100vh - 130px);
      background: white;
      border: 1px solid #ddd;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .download {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="./index.html">首页</a>
    <a href="./pdf.html">PDF 文档</a>
  </nav>

  <main>
    <h1>PDF 文档展示</h1>

    <p class="download">
      如果无法预览，可以
      <a href="./files/documents.pdf" target="_blank">点击这里打开 PDF</a>
      或
      <a href="./files/documents.pdf" download>下载 PDF</a>
    </p>

    <div class="pdf-container">
      <iframe src="./files/documents.pdf"></iframe>
    </div>
  </main>

</body>
</html>
